[package]
name = "bloom-shared"
version = "0.1.0"
edition = "2021"

[dependencies]
wgpu = "24"
raw-window-handle = "0.6"
fontdue = "0.9"
libc = "0.2"
bytemuck = { version = "1", features = ["derive"] }
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "bmp", "tga"] }
gltf = "1"
lewton = "0.10"
minimp3 = "0.5"
earcutr = "0.4"
