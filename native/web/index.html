<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bloom Engine</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100vw; height: 100vh; overflow: hidden; background: #000; }
    #bloom-canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; }
    #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
               color: #fff; font-family: monospace; font-size: 14px; }
  </style>
</head>
<body>
  <canvas id="bloom-canvas"></canvas>
  <div id="loading">Loading Bloom Engine...</div>

  <!--
    Engine-only page (no compiled game). `build.sh` produces a different page
    for game builds: it splices this same bootstrap into Perry's self-contained
    WASM HTML and gates the game's bootPerryWasm() call on __bloomReady.

    The promise is created here, synchronously during parse, so any later
    boot script can register `.then()` before the deferred module below runs.
  -->
  <script>
    window.__bloomReady = new Promise((resolve, reject) => {
      window.__bloomReadyResolve = resolve;
      window.__bloomReadyReject = reject;
    });
  </script>
  <script type="module" src="./bloom_glue.js"></script>
</body>
</html>
